# Runs the prebuilt public image from GHCR — no local build, no JDK needed.
#
#   docker compose -f compose.ghcr.yaml up -d
#   curl http://localhost:8080/actuator/health
#
# `latest` tracks the main branch. For a reproducible run, pin an immutable
# tag instead: ghcr.io/felipem554/secret_message:sha-<commit>.
# Local development builds use compose.yaml.

services:

  app:
    image: ghcr.io/felipem554/secret_message:latest
    pull_policy: always
    ports:
      - "8080:8080"
    networks:
      - nats
    depends_on:
      - redis
      - nats
    environment:
      SPRING_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redispassword}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      NATS_USER: ${NATS_USER:-natsuser}
      NATS_PASS: ${NATS_PASS:-natspassword}
      IDEMPOTENCY_MASTER_KEY: ${IDEMPOTENCY_MASTER_KEY:-ZGV2ZWxvcG1lbnQtbWFzdGVyLWtleS0zMi1ieXRlcy0=}
      DEBUG: ${DEBUG:-false}
      APP_ENV: ${APP_ENV:-development}
      JAVA_OPTS: ${JAVA_OPTS:--XX:+DisableAttachMechanism -XX:+ExitOnOutOfMemoryError -XX:-HeapDumpOnOutOfMemoryError -Dcom.sun.management.jmxremote=false}
    ulimits:
      core:
        soft: 0
        hard: 0
    mem_limit: 512m
    memswap_limit: 512m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:latest
    networks:
      - nats
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}

  nats:
    image: "nats:latest"
    ports:
      # Host port 4223 avoids colliding with a locally installed nats-server.
      - "4223:4222"
    networks:
      - nats
    command: ["--user", "${NATS_USER:-natsuser}", "--pass", "${NATS_PASS:-natspassword}"]

  nats-box:
    image: synadia/nats-box
    depends_on:
      - nats
    networks:
      - nats
    tty: true

networks:
  nats:
