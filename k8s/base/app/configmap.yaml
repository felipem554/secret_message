apiVersion: v1
kind: ConfigMap
metadata:
  name: secret-message-config
  labels:
    app.kubernetes.io/name: secret-message
    app.kubernetes.io/component: app
data:
  APP_ENV: development
  DEBUG: "false"
  SPRING_REDIS_HOST: redis
  SPRING_REDIS_PORT: "6379"
  NATS_URL: nats://nats:4222
  # Memory hardening defaults (docs/MEMORY_HARDENING.md): no dynamic attach
  # (jmap/jcmd/agents), no remote JMX, die instead of writing a heap dump on
  # OOM. Core dumps are disabled by docker-entrypoint.sh (ulimit -c 0);
  # Kubernetes has no pod-level ulimit setting.
  JAVA_OPTS: >-
    -XX:+DisableAttachMechanism
    -XX:+ExitOnOutOfMemoryError
    -XX:-HeapDumpOnOutOfMemoryError
    -Dcom.sun.management.jmxremote=false
