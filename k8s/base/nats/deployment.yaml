apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  labels:
    app.kubernetes.io/name: secret-message
    app.kubernetes.io/component: nats
spec:
  # Core NATS only (no JetStream): the transport is intentionally ephemeral
  # request-reply RPC with nothing at rest (docs/TRANSPORT_NATS_VS_KAFKA.md).
  # The compose file's -DV --trace flags are dev-only and deliberately
  # omitted: trace logging would print plaintext payloads.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: secret-message
      app.kubernetes.io/component: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secret-message
        app.kubernetes.io/component: nats
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nats
          image: nats:2.10-alpine
          args:
            # Monitoring port is probe-only: no Service exposes it.
            - --http_port
            - "8222"
            - --user
            - $(NATS_USER)
            - --pass
            - $(NATS_PASS)
          env:
            - name: NATS_USER
              valueFrom:
                secretKeyRef:
                  name: secret-message-secrets
                  key: NATS_USER
            - name: NATS_PASS
              valueFrom:
                secretKeyRef:
                  name: secret-message-secrets
                  key: NATS_PASS
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            periodSeconds: 5
