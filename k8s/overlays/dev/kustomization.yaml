apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: secret-message-dev

resources:
  - namespace.yaml
  - ../../base

# Copy secrets.env.example to secrets.env and fill in real values before
# building. secrets.env is gitignored.
secretGenerator:
  - name: secret-message-secrets
    envs:
      - secrets.env
